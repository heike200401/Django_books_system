{% extends 'base.html' %}

{% block title %}删除读者 - 图书馆管理系统{% endblock %}

{% block content %}
<div class="card">
    <h2>确认删除</h2>
    <p style="margin: 20px 0;">您确定要删除读者 <strong>{{ reader.user.first_name }}{{ reader.user.last_name }}</strong> 吗？</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">确认删除</button>
        <a href="{% url 'reader_list' %}" class="btn btn-primary">取消</a>
    </form>
</div>
{% endblock %}
